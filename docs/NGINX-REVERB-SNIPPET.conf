# Snippet untuk aaPanel: proxy WebSocket Laravel Reverb
# Letakkan di dalam block server { } untuk portalsifast.rsaisyiyahsitifatimah.com
# Ganti isi location /app dan /apps yang ada dengan block di bawah (atau gabungkan).

    # Laravel Reverb WebSocket (path /app/ dipakai oleh Pusher protocol)
    location /app/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Pusher-Protocol "7";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
